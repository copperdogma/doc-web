module_id: run_dispatch_v1
stage: intake
entrypoint: modules/intake/run_dispatch_v1/main.py
input_schema: intake_plan_v1
output_schema: intake_handoff_v1
param_schema:
  plan:
    type: string
    description: Path to the approved intake plan artifact (`overview_plan_final.jsonl`).
    required: false
  dispatch_hint:
    type: string
    description: Optional legacy hint artifact that contains `plan_path`.
    required: false
  downstream_run_id:
    type: string
    description: Optional explicit run_id for the downstream explicit-recipe run.
    required: false
  downstream_end_at:
    type: string
    description: Optional downstream stage id to stop after, forwarded as --end-at.
    required: false
  allow_run_id_reuse:
    type: boolean
    description: Forward --allow-run-id-reuse to the downstream driver invocation.
    required: false
  dry_run:
    type: boolean
    description: If true, write the handoff artifact but do not execute the downstream recipe.
    required: false
notes: "Launches the approved maintained recipe from an approved intake plan and records an inspectable intake_handoff_v1 artifact."
