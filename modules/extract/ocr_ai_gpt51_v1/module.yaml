module_id: ocr_ai_gpt51_v1
stage: extract
entrypoint: modules/extract/ocr_ai_gpt51_v1/main.py
input_schema: page_image_v1
output_schema: page_html_v1
default_params:
  model: gpt-5.1
  max_output_tokens: 4096
  temperature: 0.0
  allow_empty: false
  save_raw: false
  max_long_side: 0
  concurrency: 1
  skip_blank_pages: false
  blank_threshold: 0.99
param_schema:
  properties:
    model:
      type: string
    max_output_tokens:
      type: integer
      minimum: 256
    temperature:
      type: number
      minimum: 0
      maximum: 2
    allow_empty:
      type: boolean
    save_raw:
      type: boolean
    ocr_hints:
      type: string
    max_long_side:
      type: integer
      minimum: 0
      description: "Downsample images so longest side <= N pixels (0=disabled)"
    concurrency:
      type: integer
      minimum: 1
      maximum: 20
      description: "Number of parallel API calls (1=sequential)"
    skip_blank_pages:
      type: boolean
      description: "Skip near-white pages without making an API call"
    blank_threshold:
      type: number
      minimum: 0
      maximum: 1
      description: "Fraction of near-white pixels to consider a page blank"
    retry_model:
      type: string
      description: "Optional stronger model to retry with when OCR returns empty HTML"
  required: [model]
notes: "Vision OCR to per-page HTML. Supports image downsampling (max_long_side), parallel execution (concurrency), conservative blank page detection (skip_blank_pages), and a stronger-model retry on empty output."
