module_id: build_chapter_html_v1
stage: build
entrypoint: modules/build/build_chapter_html_v1/main.py
input_schema: null
output_schema: null
description: "Build per-chapter HTML5 documents from pages + portion hypotheses. Includes embedded CSS, semantic structure (<figure>/<figcaption>), chapter navigation, responsive styling, and rich image alt text."
params:
  - name: output_dir
    type: str
    default: null
  - name: illustration_manifest
    type: str
    default: null
  - name: images_subdir
    type: str
    default: images
  - name: book_title
    type: str
    default: ""
  - name: book_author
    type: str
    default: ""
  - name: merge_contiguous_genealogy_tables
    type: bool
    default: false
  - name: include_navigation
    type: bool
    default: true
  - name: suppress_navigation
    type: bool
    default: false
  - name: normalize_reference_entries
    type: bool
    default: false
  - name: normalize_catalog_entries
    type: bool
    default: false
notes: "Produces self-contained HTML5 documents. Images wrapped in <figure> with <figcaption> from VLM caption text. Alt text uses VLM image_description."
