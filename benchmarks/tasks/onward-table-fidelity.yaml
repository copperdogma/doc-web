description: "Onward Genealogy Table Fidelity (Multi-page)"
prompts:
  - file://../prompts/onward_ocr.js
providers:
  # Anthropic — latest flagships
  - id: anthropic:messages:claude-opus-4-6
    label: "Claude Opus 4.6"
    config:
      temperature: 0
      max_tokens: 16384
  - id: anthropic:messages:claude-sonnet-4-6
    label: "Claude Sonnet 4.6"
    config:
      temperature: 0
      max_tokens: 16384
  # OpenAI — latest flagships
  - id: openai:gpt-5.1
    label: "GPT-5.1"
    config:
      temperature: 0.0
      max_tokens: 16384
  - id: openai:gpt-4o
    label: "GPT-4o"
    config:
      temperature: 0.0
      max_tokens: 16384
  # Google — latest
  - id: google:gemini-2.5-pro
    label: "Gemini 2.5 Pro"
    config:
      maxOutputTokens: 16384
      temperature: 0.0
defaultTest:
  assert:
    - type: python
      value: file://../scorers/html_table_diff.py
tests:
  - vars:
      image_list: "../../input/onward-to-the-unknown-images/Image022.jpg,../../input/onward-to-the-unknown-images/Image023.jpg,../../input/onward-to-the-unknown-images/Image024.jpg,../../input/onward-to-the-unknown-images/Image025.jpg"
      golden_path: "golden/onward/alma.html"
  - vars:
      image_list: "../../input/onward-to-the-unknown-images/Image029.jpg,../../input/onward-to-the-unknown-images/Image030.jpg,../../input/onward-to-the-unknown-images/Image031.jpg,../../input/onward-to-the-unknown-images/Image032.jpg,../../input/onward-to-the-unknown-images/Image033.jpg,../../input/onward-to-the-unknown-images/Image034.jpg"
      golden_path: "golden/onward/arthur.html"
  - vars:
      image_list: "../../input/onward-to-the-unknown-images/Image079.jpg,../../input/onward-to-the-unknown-images/Image080.jpg,../../input/onward-to-the-unknown-images/Image081.jpg,../../input/onward-to-the-unknown-images/Image082.jpg,../../input/onward-to-the-unknown-images/Image083.jpg"
      golden_path: "golden/onward/marie_louise.html"
