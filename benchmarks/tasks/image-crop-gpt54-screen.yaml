description: "Image crop extraction screen for GPT-5.4 Mini/Nano"

defaultTest:
  options:
    provider: anthropic:messages:claude-opus-4-6

prompts:
  - id: "file://../prompts/crop-conservative-count.js"
    label: "conservative-count"

providers:
  - id: openai:chat:gpt-5.4-mini
    label: "GPT-5.4 Mini"
    config:
      temperature: 0
      max_tokens: 4096
  - id: openai:chat:gpt-5.4-nano
    label: "GPT-5.4 Nano"
    config:
      temperature: 0
      max_tokens: 4096

tests:
  - vars:
      image: file://../input/source-pages-b64/Image000.b64.txt
      golden_key: "Image000"
    assert:
      - type: python
        value: file://../scorers/image_crop_scorer.py

  - vars:
      image: file://../input/source-pages-b64/Image011.b64.txt
      golden_key: "Image011"
    assert:
      - type: python
        value: file://../scorers/image_crop_scorer.py

  - vars:
      image: file://../input/source-pages-b64/Image037.b64.txt
      golden_key: "Image037"
    assert:
      - type: python
        value: file://../scorers/image_crop_scorer.py
