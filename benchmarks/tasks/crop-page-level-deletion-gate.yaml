description: "Crop page-level deletion gate — validate maintained runtime crops against source-page context"

prompts:
  - id: "file://../prompts/validate-page-level-crop.js"
    label: "page-context"

providers:
  - id: openai:responses:gpt-5.5
    label: "GPT-5.5 Responses"
    config:
      reasoning_effort: none
      max_output_tokens: 2048

tests:
  - vars:
      page_image: file://../input/source-pages-b64/Image000.b64.txt
      crop_image: file://../input/crop-validation-b64/page-001-000.b64.txt
      crop_key: "page-001-000"
      golden_relpath: "golden/crop-page-level-deletion-gate.json"
    assert:
      - type: python
        value: file://../scorers/crop_validation_scorer.py

