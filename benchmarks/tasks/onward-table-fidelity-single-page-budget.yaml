description: "Onward Single-Page OCR — Budget Model Re-Eval (Story 134 A7)"
prompts:
  - file://../prompts/onward_ocr.js
providers:
  # Budget Gemini models — failed multi-page due to truncation, testing single-page
  - id: google:gemini-2.5-flash
    label: "Gemini 2.5 Flash"
    config:
      maxOutputTokens: 8192
      temperature: 0.0
  - id: google:gemini-3-flash-preview
    label: "Gemini 3 Flash"
    config:
      maxOutputTokens: 8192
      temperature: 0.0
  - id: google:gemini-3.1-flash-lite-preview
    label: "Gemini 3.1 Flash-Lite"
    config:
      maxOutputTokens: 8192
      temperature: 0.0
  # Budget OpenAI models
  - id: openai:gpt-5-mini
    label: "GPT-5 Mini"
    config:
      temperature: 0.0
      max_tokens: 8192
defaultTest:
  assert:
    - type: python
      value: file://../scorers/html_table_diff.py
