# Codex-Forge Eval Registry
# Central source of truth for all evals, their scores, and improvement attempts.
# Updated by AI agents whenever evals are run. See AGENTS.md for protocol.
#
# Types:
#   quality     — "How good is our output?" Continuous improvement target.
#   compromise  — "Can we eliminate this compromise?" Binary pass/fail gate.
#
# Score fields:
#   latency_ms      — avg per-call latency (REQUIRED when measurable)
#   cost_usd        — avg per-call cost in USD (REQUIRED if model has pricing)
#   cost_estimated  — present+true when cost was computed from tokens, not promptfoo
#
# retry_when conditions:
#   new-worker-model     — A smarter orchestrating AI might succeed
#   new-subject-model    — A better pipeline model might pass without code changes
#   cheaper-subject-model — Works on expensive model, need cost parity at lower tier
#   faster-subject-model — Works on slow model, need latency parity at faster tier
#   new-approach         — Current approaches exhausted, needs fresh thinking
#   golden-fix           — Golden reference may be wrong or incomplete
#   architecture-change  — Upstream pipeline needs to change first

evals:

  # ── Quality Evals (promptfoo) ─────────────────────────────────────────────

  - id: image-crop-extraction
    name: Image Crop Extraction
    type: quality
    description: >
      Detect and extract illustration bounding boxes from scanned book pages.
      Tests detector accuracy (IoU), count matching, and text exclusion.
    pipeline_stage: crop_illustrations
    runner: promptfoo
    command: "cd benchmarks && promptfoo eval -c tasks/image-crop-extraction.yaml --no-cache -j 3"
    config: benchmarks/tasks/image-crop-extraction.yaml
    scorer: benchmarks/scorers/image_crop_scorer.py
    golden: benchmarks/golden/
    spec_compromise: C4

    target:
      metric: overall
      value: 0.95
      pass_rate: 0.90

    scores:
      - model: "Gemini 3 Pro (detector) + Gemini 2.5 Flash (validator)"
        metrics:
          overall: 0.856
          pass_rate: 0.77
        measured: 2026-01-25
        note: "Winning combo. Two-stage detector-validator with auto-retry on count mismatch."
      - model: "Gemini 2.5 Pro"
        metrics:
          overall: 0.78
        measured: 2026-01-24
        note: "Baseline eval before model sweep"
      - model: "Claude Sonnet 4.5"
        metrics:
          overall: 0.72
        measured: 2026-01-24
        note: "Struggled with multi-illustration pages"
      - model: "GPT-5.1"
        metrics:
          overall: 0.68
        measured: 2026-01-24
        note: "Poor bounding box precision"

    attempts:
      - id: "001"
        date: 2026-01-24
        status: succeeded
        approach: "Multi-model sweep with promptfoo (7 models × 3 prompt variants)"
        score_before: null
        score_after: 0.856
        note: "Gemini 3 Pro with baseline prompt won. Simpler prompts beat strict-exclude."
      - id: "002"
        date: 2026-01-25
        status: succeeded
        approach: "Added validator stage (Gemini 2.5 Flash) and auto-retry on count mismatch"
        score_before: 0.856
        score_after: 0.856
        note: "Score unchanged but text contamination eliminated in production crops"

    retry_when:
      - condition: new-subject-model
        note: "Gemini 4 or equivalent may push past 0.95 target"
      - condition: golden-fix
        note: "Golden references cover limited page types; add table-heavy pages"

  # ── Quality Evals (OCR) ──────────────────────────────────────────────────

  - id: ocr-model-genealogy
    name: OCR Model Eval — Genealogy / Table-Heavy Books
    type: quality
    description: >
      Evaluate OCR quality for table-heavy layouts (Onward to the Unknown).
      Tests text accuracy, table structure preservation, and column alignment.
    pipeline_stage: ocr
    runner: manual
    spec_compromise: C1

    target:
      metric: character_accuracy
      value: 0.99

    scores:
      - model: "GPT-5.1 (AI-first OCR)"
        metrics:
          character_accuracy: 0.97
        measured: 2026-02-20
        note: "Story 127 — good for prose, struggles with dense tables"

    attempts:
      - id: "001"
        date: 2026-02-20
        status: partial
        approach: "Benchmarked GPT-5.1 on Onward table pages"
        note: "Prose excellent; tables need rescue pass or layout-aware model"

    retry_when:
      - condition: new-subject-model
        note: "Models with native table understanding may eliminate rescue pass"

  # ── Compromise Detection Evals ───────────────────────────────────────────

  - id: single-model-crop-detection
    name: "C4 Detection: Single-Model Crop Quality"
    type: compromise
    description: >
      Can a single model replace the two-stage detector+validator?
      Tests whether one call achieves ≥0.95 with zero text contamination.
    spec_compromise: C4
    runner: promptfoo

    target:
      metric: overall
      value: 0.95
      pass_rate: 0.95

    scores:
      - model: "Gemini 3 Pro (single-stage, no validator)"
        metrics:
          overall: 0.856
          pass_rate: 0.77
        measured: 2026-01-25
        note: "Not yet passing — validator still needed"

    retry_when:
      - condition: new-subject-model
        note: "Next-gen Gemini or GPT may achieve single-stage quality"

  - id: auto-book-type-detection
    name: "C2 Detection: Auto Book Type Detection"
    type: compromise
    description: >
      Can the system auto-detect book type from PDF alone?
      Tests 10 diverse PDFs with no metadata hints.
    spec_compromise: C2
    runner: manual

    target:
      metric: accuracy
      value: 1.0
      note: "Must correctly classify all 10 test PDFs"

    scores: []
    attempts: []

    retry_when:
      - condition: new-approach
        note: "Contact sheet + VLM classification is a promising approach (Story 027)"
