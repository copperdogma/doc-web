# Doc-Forge Eval Registry
# Central source of truth for all evals, their scores, and improvement attempts.
# Updated by AI agents whenever evals are run. See AGENTS.md for protocol.
#
# Types:
#   quality     — "How good is our output?" Continuous improvement target.
#   compromise  — "Can we eliminate this compromise?" Binary pass/fail gate.
#
# Triage classes (derived, not stored as a separate field):
#   quality-runtime        — quality evals where latency/cost are active decision inputs
#   quality-capability     — quality evals focused on output fidelity / behavior quality
#   compromise-detection   — compromise evals that gate deletion of spec workarounds
# The triage skills should derive these from `type`, target fields, and context
# rather than adding another registry field unless the taxonomy needs to diverge.
#
# Score fields:
#   latency_ms      — avg per-call latency (REQUIRED when measurable)
#   cost_usd        — avg per-call cost in USD (REQUIRED if model has pricing)
#   cost_estimated  — present+true when cost was computed from tokens, not promptfoo
#
# retry_when conditions:
#   new-worker-model     — A smarter orchestrating AI might succeed
#   new-subject-model    — A better pipeline model might pass without code changes
#   cheaper-subject-model — Works on expensive model, need cost parity at lower tier
#   faster-subject-model — Works on slow model, need latency parity at faster tier
#   new-approach         — Current approaches exhausted, needs fresh thinking
#   golden-fix           — Golden reference may be wrong or incomplete
#   architecture-change  — Upstream pipeline needs to change first

evals:

  # ── Quality Evals (promptfoo) ─────────────────────────────────────────────

  - id: image-crop-extraction
    name: Image Crop Extraction
    type: quality
    description: >
      Detect and extract illustration bounding boxes from scanned book pages.
      Tests detector accuracy (IoU), count matching, and text exclusion.
    pipeline_stage: crop_illustrations
    runner: promptfoo
    command: "cd benchmarks && promptfoo eval -c tasks/image-crop-extraction.yaml --no-cache -j 3"
    config: benchmarks/tasks/image-crop-extraction.yaml
    scorer: benchmarks/scorers/image_crop_scorer.py
    golden: benchmarks/golden/
    spec_compromise: C4

    target:
      metric: overall
      value: 0.95
      pass_rate: 0.90

    scores:
      - model: "Gemini 3 Flash (conservative-count prompt)"
        metrics:
          overall: 0.900
          pass_rate: 0.923
        measured: 2026-03-11
        note: "Story 133. 5.7x cheaper than Pro ($0.22 vs $1.25/book). Axis-swap fix + conservative-count prompt."
      - model: "Gemini 3 Pro (detector) + Gemini 2.5 Flash (validator)"
        metrics:
          overall: 0.856
          pass_rate: 0.77
        measured: 2026-01-25
        note: "Previous winner. Two-stage detector-validator with auto-retry on count mismatch."
      - model: "Gemini 2.5 Pro"
        metrics:
          overall: 0.78
        measured: 2026-01-24
        note: "Baseline eval before model sweep"
      - model: "Claude Sonnet 4.5"
        metrics:
          overall: 0.72
        measured: 2026-01-24
        note: "Struggled with multi-illustration pages"
      - model: "GPT-5.1"
        metrics:
          overall: 0.68
        measured: 2026-01-24
        note: "Poor bounding box precision"

    attempts:
      - id: "001"
        date: 2026-01-24
        status: succeeded
        approach: "Multi-model sweep with promptfoo (7 models × 3 prompt variants)"
        score_before: null
        score_after: 0.856
        note: "Gemini 3 Pro with baseline prompt won. Simpler prompts beat strict-exclude."
      - id: "002"
        date: 2026-01-25
        status: succeeded
        approach: "Added validator stage (Gemini 2.5 Flash) and auto-retry on count mismatch"
        score_before: 0.856
        score_after: 0.856
        note: "Score unchanged but text contamination eliminated in production crops"
      - id: "003"
        date: 2026-03-11
        status: succeeded
        approach: "Story 133: Gemini 3 Flash + conservative-count prompt + axis-swap fix + token budget increase"
        score_before: 0.856
        score_after: 0.900
        note: "5.7x cost reduction ($1.25→$0.22/book). 20/20 golden crops in production pipeline."

    retry_when:
      - condition: new-subject-model
        note: "Gemini 4 or equivalent may push past 0.95 target"
      - condition: golden-fix
        note: "Golden references cover limited page types; add table-heavy pages"

  # ── Quality Evals (OCR) ──────────────────────────────────────────────────

  - id: ocr-model-genealogy
    name: OCR Model Eval — Genealogy / Table-Heavy Books
    type: quality
    description: >
      Evaluate OCR quality for table-heavy layouts (Onward to the Unknown).
      Tests text accuracy, table structure preservation, and column alignment.
    pipeline_stage: ocr
    runner: manual
    spec_compromise: C1

    target:
      metric: character_accuracy
      value: 0.99

    scores:
      - model: "GPT-5.1 (AI-first OCR)"
        metrics:
          character_accuracy: 0.97
        measured: 2026-02-20
        note: "Story 127 — good for prose, struggles with dense tables"

    attempts:
      - id: "001"
        date: 2026-02-20
        status: partial
        approach: "Benchmarked GPT-5.1 on Onward table pages"
        note: "Prose excellent; tables need rescue pass or layout-aware model"
      - id: "002"
        date: 2026-03-14
        status: succeeded
        approach: "Story 140 page-golden coverage expansion for reviewed Roseanna/Emilie continuations"
        note: >
          Added hand-verified page goldens `page-089`, `page-097`, and `page-098`
          to `benchmarks/tasks/ocr-genealogy-tables.yaml` and
          `benchmarks/tasks/ocr-genealogy-tables-gpt-only.yaml`. Story 140
          validated those pages by direct artifact-vs-golden scoring on
          `story140-onward-targeted-rescue-r7`, `r13`, and `r19` rather than a
          fresh promptfoo model sweep, so no new comparable model score is
          recorded here yet.

    retry_when:
      - condition: new-subject-model
        note: "Models with native table understanding may eliminate rescue pass"

  - id: onward-table-fidelity
    name: Onward Genealogy Table Fidelity
    type: quality
    description: >
      Multi-page genealogy table OCR fidelity for Onward to the Unknown.
      Tests cell-level accuracy against hand-validated golden references
      using LCS sequence alignment to match rows.
    pipeline_stage: ocr
    runner: promptfoo
    command: "cd benchmarks && promptfoo eval -c tasks/onward-table-fidelity.yaml --no-cache -j 2"
    config: benchmarks/tasks/onward-table-fidelity.yaml
    scorer: benchmarks/scorers/html_table_diff.py
    golden: benchmarks/golden/onward/
    spec_compromise: C1
    golden_verified: true  # Hand-validated 100% correct against scans

    target:
      metric: structure_preservation
      value: 0.95

    ranking:
      quality_winner: "Gemini 3.1 Pro"
      balanced_winner: "Gemini 3.1 Pro"
      value_winner: "GPT-5.4"
      note: >
        2026-03-11 refresh: Gemini 3.1 Pro is new quality winner (0.969, up from 0.115
        with truncation fix). Cheapest of the models that meet 0.95 target ($0.09/call).
        GPT-5.4 is value winner — same quality as Opus (0.952) at 3x lower cost ($0.11).
        Previous Claude winners stable but dethroned on quality by Gemini.
      applied: >
        Recipe updated to gemini-3.1-pro-preview with maxOutputTokens=65536 (2026-03-11).
        Previous: claude-sonnet-4-6 (balanced winner from attempt 001).

    scores:
      # --- 2026-03-11 refresh (attempt 002) ---
      - model: "Gemini 3.1 Pro"
        metrics:
          structure_preservation: 0.969
          alma: 0.923
          arthur: 0.989
          marie_louise: 0.995
        latency_ms: 207500
        cost_usd: 0.0903
        cost_estimated: true
        measured: 2026-03-11
        note: "New quality winner. maxOutputTokens=65536 required (reasoning eats budget). Slowest but cheapest of quality tier."
      - model: "Claude Opus 4.6"
        metrics:
          structure_preservation: 0.953
          alma: 0.923
          arthur: 0.964
          marie_louise: 0.973
        latency_ms: 123118
        cost_usd: 0.3175
        measured: 2026-03-11
        note: "Stable vs prior run (+0.001). 3.5x more expensive than Gemini 3.1 Pro."
      - model: "GPT-5.4"
        metrics:
          structure_preservation: 0.952
          alma: 0.907
          arthur: 0.976
          marie_louise: 0.972
        latency_ms: 102571
        cost_usd: 0.1067
        cost_estimated: true
        measured: 2026-03-11
        note: "New. Fastest model that meets 0.95 target. Value winner — Opus quality at Sonnet price."
      - model: "Claude Sonnet 4.6"
        metrics:
          structure_preservation: 0.945
          alma: 0.918
          arthur: 0.978
          marie_louise: 0.939
        latency_ms: 110051
        cost_usd: 0.1842
        measured: 2026-03-11
        note: "Stable vs prior run (-0.001). No longer balanced winner — GPT-5.4 is cheaper and higher quality."
      # --- Budget Gemini models (truncation-limited, pending re-eval) ---
      - model: "Gemini 2.5 Flash"
        metrics:
          structure_preservation: 0.886
          alma: 0.839
          arthur: 0.918
          marie_louise: 0.900
        latency_ms: 84000
        cost_usd: 0.0555
        cost_estimated: true
        measured: 2026-03-11
        note: "Best budget model. Below 0.95 target but fast and cheap. May improve with prompt tuning."
      # --- Previous scores (attempt 001, 2026-03-10) ---
      - model: "GPT-4o"
        metrics:
          structure_preservation: 0.855
        latency_ms: 688500
        cost_usd: 0.1104
        cost_estimated: true
        measured: 2026-03-10
        note: "Decent but slow (689s avg). Not competitive with Claude or GPT-5.4."
      - model: "GPT-5.1"
        metrics:
          structure_preservation: 0.847
        latency_ms: 91200
        cost_usd: 0.1155
        cost_estimated: true
        measured: 2026-03-10
        note: "Merges continuation rows. Superseded by GPT-5.4."
      - model: "Gemini 2.5 Pro"
        metrics:
          structure_preservation: 0.577
        latency_ms: 97000
        cost_usd: 0.1480
        cost_estimated: true
        measured: 2026-03-10
        note: "Merges BOY/GIRL columns despite instructions. Superseded by Gemini 3.1 Pro."

    attempts:
      - id: "001"
        date: 2026-03-10
        status: succeeded
        approach: "5-model sweep with alignment-based scorer and iterative prompt tuning"
        score_before: null
        score_after: 0.952
        note: >
          Started with broken scorer (strict positional comparison), 0.57 avg.
          Fixed scorer with LCS alignment → 0.916. Fixed prompt for section headers → 0.952.
          Key wins: (1) alignment scorer, (2) explicit section header separation, (3) Claude Opus model.
      - id: "002"
        date: 2026-03-11
        status: succeeded
        approach: "8-model refresh: GPT-5.4, GPT-5.2 Pro, Gemini 3.1 Pro, Gemini budget models (Flash, Flash-Lite) + re-run previous winners"
        score_before: 0.952
        score_after: 0.969
        note: >
          Gemini 3.1 Pro jumped from 0.115 → 0.969 after fixing maxOutputTokens (16384→65536).
          Reasoning tokens were consuming output budget, truncating tables. GPT-5.4 matched Opus
          quality at 3x lower cost. GPT-5.2 Pro is not a chat model (404). Budget Gemini models
          (Flash, Flash-Lite) scored 0.72-0.89 but truncation-limited on longer tables.
          Created enrich-eval-results.py for cost/latency/quality analysis.
          Created discover-models.ts for model discovery across providers.

    retry_when:
      - condition: new-subject-model
        note: "Future models may improve alma score (weakest across all models due to handwritten annotations)"
      - condition: cheaper-subject-model
        note: "Gemini Flash at 0.886 is close — prompt tuning or future Flash versions may cross 0.95"
      - condition: downsampling-sweep
        note: "Story 134 validated 2048px. Test 1500px/1024px for further cost reduction if needed."

    # --- 2026-03-12 Story 134 optimization validations ---
    downsample_validation:
      - resolution: "2048px (1582x2048 from 5100x6600)"
        model: "Gemini 3.1 Pro"
        metrics:
          structure_preservation: 0.963
          alma: 0.930
          arthur: 0.980
          marie_louise: 0.980
        measured: 2026-03-12
        note: >
          Story 134 A1 validation. Downsampled from 34MP to ~3.2MP (10.6x fewer pixels).
          Quality delta: -0.006 vs full-res baseline (0.969). Within VLM non-determinism.
          Validates max_long_side=2048 as safe default for OCR pipeline.

    single_page_budget_eval:
      - model: "Gemini 2.5 Flash"
        metrics: { single_page_avg: 0.257 }
        measured: 2026-03-12
        note: "Story 134 A7. Per-page table quality vs Gemini 3.1 Pro golden. Not viable for table content."
      - model: "Gemini 3 Flash"
        metrics: { single_page_avg: 0.103 }
        measured: 2026-03-12
        note: "Worst performer. 2 pages produced no tables at all."
      - model: "Gemini 3.1 Flash-Lite"
        metrics: { single_page_avg: 0.271 }
        measured: 2026-03-12
        note: "Similar to 2.5 Flash. Budget models genuinely worse at table OCR, not just truncation-limited."
      - model: "GPT-5 Mini"
        metrics: { single_page_avg: 0.272 }
        measured: 2026-03-12
        note: "OpenAI budget model. Same quality tier as Gemini Flash-Lite."

  - id: onward-document-consistency-planning
    name: Onward Document Consistency Planning
    type: quality
    description: >
      Manual eval for the document-level planning artifacts emitted after page-scope
      extraction on Onward genealogy chapters. Measures whether the planner surfaces
      manually observed format-drift classes better than the chapter-first detector
      and keeps row-semantic issues distinct from pure format drift.
    pipeline_stage: validate
    runner: manual
    spec_compromise: C7

    target:
      metric: missed_manual_format_coverage
      value: 1.0

    scores:
      - model: "Story 144 planner (gpt-5 primary, gpt-4.1 fallback)"
        metrics:
          missed_manual_format_coverage: 1.0
          chapter_009_not_pure_format: 1.0
        measured: 2026-03-15
        note: >
          Story 144 revalidated on `story144-onward-document-consistency-plan-r7`
          after hardening mixed-summary bucketing and dossier-supported issue-type
          normalization.
          The `conformance_report` surfaced the previously missed manual format-failure
          chapters `011/012/013/014/018/019/020`, kept `chapter-010.html` flagged,
          routed `chapter-009.html` into a mixed row-semantic-containing bucket
          instead of pure format drift, and restored `chapter-023.html` to
          conformant baseline status.
      - model: "Story 146 planner-guided rerun loop (gpt-5 rerun stage)"
        metrics:
          missed_manual_format_coverage: 1.0
          chapter_009_not_pure_format: 1.0
          remaining_format_issue_count: 19
          remaining_format_issue_delta: -2
        measured: 2026-03-15
        note: >
          Story 146 validation run `story146-onward-plan-aware-genealogy-reruns-r1`
          consumed `pattern_inventory`, `consistency_plan`, and `conformance_report`
          inside the rerun loop, accepted `11/18` targeted pages, preserved
          `chapter-009.html` as mixed and `chapter-023.html` as conformant, and
          lowered remaining pure-format issue-type count from `21` to `19` by
          clearing `fragmented_multi_table_chapter` from `chapter-018.html` and
          `chapter-019.html` plus `missing_subgroup_rows` from `chapter-017.html`,
          although the pure-format chapter set itself did not shrink.

    attempts:
      - id: "001"
        date: 2026-03-15
        status: succeeded
        approach: "Story 144 document-level dossier + AI planning pass + normalized conformance report"
        note: >
          Driver run `story144-onward-document-consistency-plan-r5` emitted
          `pattern_inventory`, `consistency_plan`, and `conformance_report`
          sidecars and outperformed the existing chapter-first detector on the
          reviewed missed-format set.
      - id: "002"
        date: 2026-03-15
        status: succeeded
        approach: "Story 144 post-validate hardening for mixed-summary bucketing and dossier-supported issue typing"
        note: >
          Driver run `story144-onward-document-consistency-plan-r7` preserved the
          missed-format coverage while removing `chapter-009.html` from pure-format
          summary buckets and preventing unsupported AI issue-type hallucinations
          from flagging clean `chapter-023.html`.
      - id: "003"
        date: 2026-03-15
        status: partial
        approach: "Story 146 plan-aware reruns consume planning sidecars and re-plan after bounded source-aware rereads"
        note: >
          Driver run `story146-onward-plan-aware-genealogy-reruns-r1` proved the
          emitted planning artifacts are actionable input to the rerun stage and
          preserved the mixed/conformant guardrails, but direct-HTML reruns only
          reduced remaining pure-format issue-type count (`21 -> 19`) instead of
          shrinking the pure-format chapter set.

    retry_when:
      - condition: new-approach
        note: "Direct-HTML plan-aware reruns plateaued on Onward; the next experiment is a structured/row-oriented repair target or a second repeated-structure document."
      - condition: architecture-change
        note: "If the structured repair target lands, re-measure whether the remaining pure-format chapter set can finally shrink instead of only lowering issue severity."

  # ── Compromise Detection Evals ───────────────────────────────────────────

  - id: single-model-crop-detection
    name: "C4 Detection: Single-Model Crop Quality"
    type: compromise
    description: >
      Can a single model replace the two-stage detector+validator?
      Tests whether one call achieves ≥0.95 with zero text contamination.
    spec_compromise: C4
    runner: promptfoo

    target:
      metric: overall
      value: 0.95
      pass_rate: 0.95

    scores:
      - model: "Gemini 3 Pro (single-stage, no validator)"
        metrics:
          overall: 0.856
          pass_rate: 0.77
        measured: 2026-01-25
        note: "Not yet passing — validator still needed"

    retry_when:
      - condition: new-subject-model
        note: "Next-gen Gemini or GPT may achieve single-stage quality"

  - id: auto-book-type-detection
    name: "C2 Detection: Auto Book Type Detection"
    type: compromise
    description: >
      Can the system auto-detect book type from PDF alone?
      Tests 10 diverse PDFs with no metadata hints.
    spec_compromise: C2
    runner: manual

    target:
      metric: accuracy
      value: 1.0
      note: "Must correctly classify all 10 test PDFs"

    scores: []
    attempts: []

    retry_when:
      - condition: new-approach
        note: "Contact sheet + VLM classification is a promising approach (Story 027)"
