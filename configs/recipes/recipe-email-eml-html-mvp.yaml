# Maintained plain-text `.eml` lane for one bounded single-message direct-entry slice.

input:
  eml: testdata/email-eml-mini.eml  # override via run config / --input-eml

stages:
  - id: email_intake
    stage: extract
    module: unstructured_email_intake_v1
    out: elements.jsonl
    params:
      content_source: text/plain
      process_attachments: false
      save_raw: false

  - id: email_bundle
    stage: transform
    module: email_elements_to_bundle_v1
    needs: [email_intake]
    inputs:
      input: email_intake
    out: email_bundle_report.json
    params:
      book_title: ""
      book_author: ""
