# Maintained DOCX native-structure lane for heading-based prose documents.

input:
  docx: testdata/docx-mini.docx  # override via run config / --input-docx

stages:
  - id: docx_intake
    stage: extract
    module: unstructured_docx_intake_v1
    out: elements.jsonl
    params:
      infer_table_structure: true
      include_page_breaks: true
      save_raw: false

  - id: docx_bundle
    stage: transform
    module: docx_elements_to_bundle_v1
    needs: [docx_intake]
    inputs:
      input: docx_intake
    out: docx_bundle_report.json
    params:
      book_title: ""
      book_author: ""
