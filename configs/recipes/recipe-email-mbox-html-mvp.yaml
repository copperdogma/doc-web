# Maintained plain-text `.mbox` lane for one bounded multi-message direct-entry slice.

input:
  mbox: testdata/email-mbox-mini.mbox  # override via run config / --input-mbox

stages:
  - id: email_archive_intake
    stage: extract
    module: mailbox_mbox_intake_v1
    out: elements.jsonl
    params:
      content_source: text/plain
      process_attachments: false
      save_raw: false

  - id: email_archive_bundle
    stage: transform
    module: mbox_elements_to_bundle_v1
    needs: [email_archive_intake]
    inputs:
      input: email_archive_intake
    out: email_archive_bundle_report.json
    params:
      book_title: ""
      book_author: ""
