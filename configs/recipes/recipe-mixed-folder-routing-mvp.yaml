# Maintained mixed-folder routing lane for one bounded repo-owned fixture.

input:
  folder: testdata/mixed-folder-mini  # override via run config / --input-folder

stages:
  - id: folder_manifest
    stage: extract
    module: folder_members_manifest_v1
    out: archive_members_manifest.jsonl

  - id: archive_route
    stage: intake
    module: archive_route_members_v1
    needs: [folder_manifest]
    inputs:
      manifest: folder_manifest
    out: archive_member_routes.jsonl
    params:
      allow_run_id_reuse: false
      pdf_member_handoff_mode: launch
