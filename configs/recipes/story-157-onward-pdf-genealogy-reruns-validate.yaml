# Story 157 proof recipe: reuse the maintained Onward PDF baseline artifacts,
# apply the targeted genealogy rerun seam, rebuild chapters, and revalidate.
# This depends on the shared output root having the baseline run artifacts.

stages:
  - id: load_pages
    stage: extract
    module: load_artifact_v1
    out: pages_html_onward_tables_fixed.jsonl
    params:
      path: output/runs/story157-onward-pdf-parity/08_table_fix_continuations_v1/pages_html_onward_tables_fixed.jsonl
      out: pages_html_onward_tables_fixed.jsonl
      schema_version: page_html_v1

  - id: load_portions
    stage: extract
    module: load_artifact_v1
    out: portions_toc.jsonl
    params:
      path: output/runs/story157-onward-pdf-parity/07_portionize_toc_html_v1/portions_toc.jsonl
      out: portions_toc.jsonl
      schema_version: portion_hyp_v1

  - id: load_crops
    stage: extract
    module: load_artifact_v1
    out: illustration_manifest.jsonl
    params:
      path: output/runs/story157-onward-pdf-parity/03_crop_illustrations_guided_v1/illustration_manifest.jsonl
      out: illustration_manifest.jsonl
      copy_sibling_dir: images

  - id: load_consistency
    stage: extract
    module: load_artifact_v1
    out: genealogy_consistency_report_initial.jsonl
    params:
      path: output/runs/story157-onward-pdf-parity/10_validate_onward_genealogy_consistency_v1/genealogy_consistency_report.jsonl
      out: genealogy_consistency_report_initial.jsonl
      schema_version: pipeline_issues_v1

  - id: rerun_genealogy_pages
    stage: adapter
    module: rerun_onward_genealogy_consistency_v1
    needs: [load_pages, load_consistency]
    inputs:
      pages: load_pages
      consistency: load_consistency
    out: pages_html_onward_genealogy_rerun.jsonl
    params:
      model: gpt-5
      target_mode: coarse
      chapter_allowlist: chapter-015.html
      page_context_window: 1
      max_pages: 10
      report: rerun_onward_genealogy_report.jsonl
      summary_report: rerun_onward_genealogy_summary.json

  - id: rebuild_chapters
    stage: build
    module: build_chapter_html_v1
    needs: [rerun_genealogy_pages, load_portions, load_crops]
    inputs:
      pages: rerun_genealogy_pages
      portions: load_portions
      illustration_manifest: load_crops
    out: chapters_manifest_after_rerun.jsonl
    params:
      images_subdir: images
      book_title: "Onward to the Unknown"
      book_author: ""
      merge_contiguous_genealogy_tables: true

  - id: validate_final_consistency
    stage: validate
    module: validate_onward_genealogy_consistency_v1
    needs: [rebuild_chapters, rerun_genealogy_pages]
    inputs:
      chapters: rebuild_chapters
      pages: rerun_genealogy_pages
    out: genealogy_consistency_report_after_rerun.jsonl
    params:
      detail_report: genealogy_consistency_detail_after_rerun.json
      flag_threshold: 25
      warning_band: 0.25
      redesign_band: 0.30
