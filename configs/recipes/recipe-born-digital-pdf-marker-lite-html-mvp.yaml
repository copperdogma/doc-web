# Maintained born-digital PDF native-text path using the bounded Marker-lite seam.

input:
  pdf: testdata/tbotb-mini.pdf  # override via run config / --input-pdf

stages:
  - id: marker_lite_html
    stage: extract
    module: extract_pdf_marker_lite_html_v1
    out: pages_html.jsonl
    params:
      container_name: story168-marker-cpu-3662
      out: pages_html.jsonl

  - id: extract_page_numbers
    stage: transform
    module: extract_page_numbers_html_v1
    needs: [marker_lite_html]
    inputs:
      pages: marker_lite_html
    out: pages_html_with_page_numbers.jsonl

  - id: portionize_toc
    stage: portionize
    module: portionize_toc_html_v1
    needs: [extract_page_numbers]
    inputs:
      pages: extract_page_numbers
    out: portions_toc.jsonl

  - id: build_chapters
    stage: build
    module: build_chapter_html_v1
    needs: [extract_page_numbers, portionize_toc]
    inputs:
      pages: extract_page_numbers
      portions: portionize_toc
    out: chapters_manifest.jsonl
    params:
      images_subdir: images
      book_title: ""
      book_author: ""
