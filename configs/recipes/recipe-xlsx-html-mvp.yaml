# Maintained XLSX native-structure lane for simple workbook tables.

input:
  xlsx: testdata/xlsx-mini.xlsx  # override via run config / --input-xlsx

stages:
  - id: xlsx_intake
    stage: extract
    module: unstructured_xlsx_intake_v1
    out: elements.jsonl
    params:
      infer_table_structure: true
      save_raw: false

  - id: xlsx_bundle
    stage: transform
    module: xlsx_elements_to_bundle_v1
    needs: [xlsx_intake]
    inputs:
      input: xlsx_intake
    out: xlsx_bundle_report.json
    params:
      book_title: ""
      book_author: ""
