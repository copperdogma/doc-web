      baseline_html: load_pierre_baseline_html
      baseline_json: load_pierre_baseline_json
    out: repair_pierre_docling_genealogy.jsonl
    params:
      lane_id: pierre
      document_title: "Pierre L'Heureux"
      profile: later_spill_after_leaky_tables
      gold_html: benchmarks/golden/onward/reviewed_html_slice/story149-onward-build-regression-r1/chapter-022.html
