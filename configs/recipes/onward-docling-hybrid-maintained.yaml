# Maintained replacement-path proof for the Story 160 Docling hybrid shape.
# Reuses current-pass stock Docling baseline artifacts and runs bounded repair
# lanes through driver.py so the proof lives under the normal recipe/module
# surface instead of a standalone spike script.

stages:
  - id: load_arthur_baseline_summary
    stage: extract
    module: load_artifact_v1
    out: arthur_baseline_summary.json
    params:
      path: output/runs/story160-docling-baseline-arthur-r1/summary.json
      out: arthur_baseline_summary.json

  - id: load_arthur_baseline_html
    stage: extract
    module: load_artifact_v1
    out: arthur_baseline.html
    params:
      path: output/runs/story160-docling-baseline-arthur-r1/docling/baseline-images/05 ARTHUR L'HEUREUX.html
      out: arthur_baseline.html
      copy_sibling_dir: images

  - id: load_arthur_baseline_json
    stage: extract
    module: load_artifact_v1
    out: arthur_baseline.json
    params:
      path: output/runs/story160-docling-baseline-arthur-r1/docling/baseline-images/05 ARTHUR L'HEUREUX.json
      out: arthur_baseline.json

  - id: repair_arthur_docling_genealogy
    stage: transform
    module: repair_docling_onward_genealogy_v1
    needs: [load_arthur_baseline_summary, load_arthur_baseline_html, load_arthur_baseline_json]
    inputs:
      baseline_summary: load_arthur_baseline_summary
      baseline_html: load_arthur_baseline_html
      baseline_json: load_arthur_baseline_json
    out: repair_arthur_docling_genealogy.jsonl
    params:
      lane_id: arthur
      document_title: "Arthur L'Heureux"
      profile: onset_before_first_table
      gold_html: benchmarks/golden/onward/arthur.html
      model: gpt-4.1
      max_output_tokens: 8000

  - id: load_pierre_baseline_summary
    stage: extract
    module: load_artifact_v1
    out: pierre_baseline_summary.json
    params:
      path: output/runs/story160-docling-baseline-pierre-r1/summary.json
